
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operaciones Basicas</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <div class="container">
        <h1>Calculadora</h1>
        <p>Operaciones básicas.</p>
        <form id="CalculadoraForm">
            <input type="number" id="num1" required placeholder="Ingresa un Numero">
            <input type="number" id="num2" required placeholder="Ingresa un Numero">

            <select id="operacion" required>
                <option value="">Selecciona una operación</option>
                <option value="suma">Suma(+)</option>
                <option value="resta">Resta(-)</option>
                <option value="multiplicacion">Multiplicación(*)</option>
                <option value="division">División(/)</option>
            </select>
            <button type="submit">Calcular</button>
        </form>
        <div id="resultado">
        </div>
    </div>
</body>
<script src="app.js"></script>

</html>
